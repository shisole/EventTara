<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="forest" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ADE80"/>
      <stop offset="50%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#166534"/>
    </linearGradient>
  </defs>
  <!-- Forest gradient background -->
  <rect width="128" height="128" fill="url(#forest)"/>
  <!-- Tree silhouettes - back row -->
  <polygon points="16,128 24,60 32,128" fill="#15803D" opacity="0.5"/>
  <polygon points="40,128 50,50 60,128" fill="#15803D" opacity="0.5"/>
  <polygon points="70,128 78,55 86,128" fill="#15803D" opacity="0.5"/>
  <polygon points="96,128 106,45 116,128" fill="#15803D" opacity="0.5"/>
  <!-- Tree silhouettes - front row -->
  <polygon points="4,128 14,70 24,128" fill="#14532D" opacity="0.6"/>
  <polygon points="28,128 40,58 52,128" fill="#14532D" opacity="0.6"/>
  <polygon points="56,128 66,65 76,128" fill="#14532D" opacity="0.6"/>
  <polygon points="80,128 92,52 104,128" fill="#14532D" opacity="0.6"/>
  <polygon points="104,128 114,68 124,128" fill="#14532D" opacity="0.6"/>
  <!-- Subtle light rays -->
  <line x1="64" y1="0" x2="30" y2="128" stroke="#FFFFFF" stroke-width="1" opacity="0.08"/>
  <line x1="64" y1="0" x2="64" y2="128" stroke="#FFFFFF" stroke-width="1" opacity="0.08"/>
  <line x1="64" y1="0" x2="98" y2="128" stroke="#FFFFFF" stroke-width="1" opacity="0.08"/>
</svg>
