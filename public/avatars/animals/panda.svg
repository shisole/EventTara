<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Round ears -->
  <circle cx="34" cy="30" r="16" fill="#1A1A1A"/>
  <circle cx="94" cy="30" r="16" fill="#1A1A1A"/>
  <!-- Body/head -->
  <circle cx="64" cy="68" r="44" fill="#FFFFFF"/>
  <!-- Black eye patches -->
  <ellipse cx="46" cy="58" rx="14" ry="12" fill="#1A1A1A" transform="rotate(-10 46 58)"/>
  <ellipse cx="82" cy="58" rx="14" ry="12" fill="#1A1A1A" transform="rotate(10 82 58)"/>
  <!-- Eyes -->
  <circle cx="46" cy="58" r="6" fill="#FFFFFF"/>
  <circle cx="82" cy="58" r="6" fill="#FFFFFF"/>
  <!-- Pupils -->
  <circle cx="46" cy="58" r="4" fill="#1A1A1A"/>
  <circle cx="82" cy="58" r="4" fill="#1A1A1A"/>
  <!-- Eye shine -->
  <circle cx="48" cy="56" r="2" fill="#FFFFFF"/>
  <circle cx="84" cy="56" r="2" fill="#FFFFFF"/>
  <!-- Nose -->
  <ellipse cx="64" cy="74" rx="5" ry="3.5" fill="#1A1A1A"/>
  <!-- Mouth -->
  <path d="M58 78 Q64 84 70 78" stroke="#555555" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Blush -->
  <circle cx="38" cy="74" r="6" fill="#FFB0B0" opacity="0.4"/>
  <circle cx="90" cy="74" r="6" fill="#FFB0B0" opacity="0.4"/>
</svg>
