<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Pointed ears -->
  <polygon points="30,48 22,12 50,38" fill="#F4A460"/>
  <polygon points="34,44 28,18 48,38" fill="#FFD0A0"/>
  <polygon points="98,48 106,12 78,38" fill="#F4A460"/>
  <polygon points="94,44 100,18 80,38" fill="#FFD0A0"/>
  <!-- Body/head -->
  <circle cx="64" cy="68" r="44" fill="#F4A460"/>
  <!-- Inner face -->
  <ellipse cx="64" cy="76" rx="22" ry="16" fill="#FFE0C0"/>
  <!-- Eyes -->
  <ellipse cx="48" cy="60" rx="6" ry="7" fill="#5CB85C"/>
  <ellipse cx="80" cy="60" rx="6" ry="7" fill="#5CB85C"/>
  <!-- Pupils -->
  <ellipse cx="48" cy="60" rx="3" ry="6" fill="#1A1A1A"/>
  <ellipse cx="80" cy="60" rx="3" ry="6" fill="#1A1A1A"/>
  <!-- Eye shine -->
  <circle cx="50" cy="58" r="2" fill="#FFFFFF"/>
  <circle cx="82" cy="58" r="2" fill="#FFFFFF"/>
  <!-- Nose -->
  <polygon points="64,72 60,68 68,68" fill="#FF8080"/>
  <!-- Mouth -->
  <path d="M58 76 Q64 82 70 76" stroke="#8B6914" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="18" y1="68" x2="42" y2="72" stroke="#8B6914" stroke-width="1" stroke-linecap="round"/>
  <line x1="18" y1="76" x2="42" y2="76" stroke="#8B6914" stroke-width="1" stroke-linecap="round"/>
  <line x1="86" y1="72" x2="110" y2="68" stroke="#8B6914" stroke-width="1" stroke-linecap="round"/>
  <line x1="86" y1="76" x2="110" y2="76" stroke="#8B6914" stroke-width="1" stroke-linecap="round"/>
  <!-- Blush -->
  <circle cx="40" cy="74" r="5" fill="#FF9999" opacity="0.4"/>
  <circle cx="88" cy="74" r="5" fill="#FF9999" opacity="0.4"/>
</svg>
