<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Fluffy round ears -->
  <circle cx="30" cy="38" r="20" fill="#A0A0A0"/>
  <circle cx="30" cy="38" r="13" fill="#C8C8C8"/>
  <circle cx="98" cy="38" r="20" fill="#A0A0A0"/>
  <circle cx="98" cy="38" r="13" fill="#C8C8C8"/>
  <!-- Body/head -->
  <circle cx="64" cy="68" r="44" fill="#A0A0A0"/>
  <!-- Face area -->
  <ellipse cx="64" cy="76" rx="24" ry="18" fill="#D0D0D0"/>
  <!-- Eyes -->
  <circle cx="50" cy="60" r="5" fill="#2D2D2D"/>
  <circle cx="78" cy="60" r="5" fill="#2D2D2D"/>
