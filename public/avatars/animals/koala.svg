  <path d="M58 82 Q64 86 70 82" stroke="#666666" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Blush -->
  <circle cx="40" cy="74" r="5" fill="#F0A0A0" opacity="0.35"/>
  <circle cx="88" cy="74" r="5" fill="#F0A0A0" opacity="0.35"/>
