<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="30%" stop-color="#FFC000"/>
      <stop offset="50%" stop-color="#FFE44D"/>
      <stop offset="70%" stop-color="#FFC000"/>
      <stop offset="100%" stop-color="#DAA520"/>
    </linearGradient>
  </defs>
  <!-- Gold ring border -->
  <circle cx="64" cy="64" r="60" fill="none" stroke="url(#gold)" stroke-width="7"/>
  <!-- Inner highlight -->
  <circle cx="64" cy="64" r="57" fill="none" stroke="#FFE873" stroke-width="1" opacity="0.5"/>
  <!-- Outer shadow -->
  <circle cx="64" cy="64" r="63" fill="none" stroke="#B8860B" stroke-width="1" opacity="0.4"/>
</svg>
