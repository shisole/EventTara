<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Neon glow outer -->
  <circle cx="64" cy="64" r="60" fill="none" stroke="#00FFFF" stroke-width="3" opacity="0.3" filter="url(#glow)"/>
  <!-- Neon bright ring -->
  <circle cx="64" cy="64" r="60" fill="none" stroke="#00FFFF" stroke-width="4"/>
  <!-- Inner bright edge -->
  <circle cx="64" cy="64" r="57" fill="none" stroke="#80FFFF" stroke-width="1.5" opacity="0.6"/>
  <!-- Outer bright edge -->
  <circle cx="64" cy="64" r="63" fill="none" stroke="#00CCCC" stroke-width="1" opacity="0.4"/>
</svg>
