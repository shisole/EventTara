<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="rainbow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF0000"/>
      <stop offset="17%" stop-color="#FF8000"/>
      <stop offset="33%" stop-color="#FFFF00"/>
      <stop offset="50%" stop-color="#00FF00"/>
      <stop offset="67%" stop-color="#0080FF"/>
      <stop offset="83%" stop-color="#8000FF"/>
      <stop offset="100%" stop-color="#FF00FF"/>
    </linearGradient>
    <linearGradient id="rainbow2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF00FF"/>
      <stop offset="17%" stop-color="#8000FF"/>
      <stop offset="33%" stop-color="#0080FF"/>
      <stop offset="50%" stop-color="#00FF00"/>
      <stop offset="67%" stop-color="#FFFF00"/>
      <stop offset="83%" stop-color="#FF8000"/>
      <stop offset="100%" stop-color="#FF0000"/>
    </linearGradient>
  </defs>
  <!-- Rainbow ring - two halves for full color coverage -->
  <path d="M64 4 A60 60 0 0 1 64 124" fill="none" stroke="url(#rainbow)" stroke-width="6"/>
  <path d="M64 124 A60 60 0 0 1 64 4" fill="none" stroke="url(#rainbow2)" stroke-width="6"/>
  <!-- Inner highlight -->
  <circle cx="64" cy="64" r="57" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
</svg>
